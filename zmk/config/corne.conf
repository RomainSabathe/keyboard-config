# ZMK looks up Kconfig files by shield name (corne_left/corne_right), so this
# file must be named corne.conf. Edit chocofi.keymap for keymap changes, but
# add any Kconfig options here directly.
CONFIG_ZMK_DISPLAY=y

# Deep sleep: after 5 minutes (300000 ms) of inactivity, power off the
# keyboard (disconnects BLE, turns off the nice_view display) to save battery.
# Any keypress wakes it and reconnects. Applies to both halves.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000
